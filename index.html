        <h1>DigitalDukandar — Free Ecommerce Website Builder</h1>
        <p>DigitalDukandar is a free ecommerce website builder that helps Indian entrepreneurs, small businesses, and resellers create a professional online store in minutes. No coding or technical skills required. Every store gets a free subdomain, product catalog, shopping cart, checkout, and admin dashboard.</p>
        <p>Trusted by thousands of Indian sellers — from boutique clothing stores to electronics shops, grocery stores, handmade goods sellers, and more. Start selling online today without any upfront cost.</p>

        <h2>Why Choose DigitalDukandar?</h2>
        <p>Building an online store has never been easier. DigitalDukandar gives you everything you need to sell online — product management, order tracking, payments, shipping, SEO tools, and customer management — all in one platform built specifically for Indian sellers.</p>

        <h2>Key Features</h2>
        <ul>
          <li><strong>Free Subdomain:</strong> Get your own store URL instantly (yourstore.digitaldukandar.in) at no cost.</li>
          <li><strong>Custom Domain:</strong> Connect your own domain name (e.g. mybrand.com) to your store.</li>
          <li><strong>Product Management:</strong> Add unlimited products with images, descriptions, prices, and variants.</li>
          <li><strong>Online Payments:</strong> Accept payments securely via Razorpay — UPI, cards, net banking supported.</li>
          <li><strong>WhatsApp Integration:</strong> Receive orders and chat with customers directly on WhatsApp.</li>
          <li><strong>Shipping with Shiprocket:</strong> Pan-India delivery and real-time order tracking built in.</li>
          <li><strong>SEO Optimization:</strong> Built-in SEO tools, sitemaps, and structured data to rank on Google.</li>
          <li><strong>Discounts and Coupons:</strong> Create promotional offers and coupon codes for your customers.</li>
          <li><strong>AI Store Designer:</strong> Redesign your store's look and feel using simple AI prompts.</li>
          <li><strong>Stock Management:</strong> Track inventory in real-time and get low-stock alerts.</li>
          <li><strong>Google Reviews:</strong> Display verified Google Reviews on your store to build customer trust.</li>
          <li><strong>Analytics Dashboard:</strong> Track sales, orders, and store performance from one place.</li>
          <li><strong>Mobile Responsive:</strong> Every store looks great on mobile, tablet, and desktop.</li>
          <li><strong>Instagram Integration:</strong> Connect Instagram and enable auto-reply for customer inquiries.</li>
          <li><strong>Banner and Carousel:</strong> Showcase your best offers with stunning image banners.</li>
        </ul>

        <h2>Who Is It For?</h2>
        <p>DigitalDukandar is ideal for small business owners in India who want to sell online without hiring a developer. Whether you sell clothes, electronics, groceries, handmade jewellery, home decor, or any other product — you can set up your store in under 5 minutes.</p>
        <ul>
          <li>Fashion boutiques and clothing stores</li>
          <li>Electronics and gadget sellers</li>
          <li>Grocery and daily needs shops</li>
          <li>Handmade and artisan product sellers</li>
          <li>Resellers and dropshippers</li>
          <li>Local businesses going digital</li>
        </ul>

        <h2>How It Works</h2>
        <ol>
          <li><strong>Sign up free</strong> — Create your store owner account in seconds.</li>
          <li><strong>Set up your store</strong> — Add your store name, logo, and products.</li>
          <li><strong>Go live instantly</strong> — Your store is live on your free subdomain immediately.</li>
          <li><strong>Start selling</strong> — Share your store link, accept orders, and manage everything from your dashboard.</li>
        </ol>
